name: OWCE CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Run unit tests (Linux, fast) ─────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/OWCE.Tests/OWCE.Tests.csproj

      - name: Run unit tests
        run: |
          dotnet test src/OWCE.Tests/OWCE.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: false

  # ── Job 2: Build Android (macOS, required for MAUI) ─────────────────────────
  build-android:
    name: Build Android
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui-android --skip-sign-check

      - name: Restore
        run: dotnet restore src/OWCE.App/OWCE.App.csproj

      - name: Build Android (Debug)
        run: |
          dotnet build src/OWCE.App/OWCE.App.csproj \
            -f net9.0-android \
            -c Debug \
            /p:AndroidKeyStore=false

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: src/OWCE.App/bin/Debug/net9.0-android/*.apk
          retention-days: 14

  # ── Job 3: Build iOS (macOS, required for MAUI) ─────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workloads
        run: dotnet workload install maui-ios --skip-sign-check

      - name: Restore
        run: dotnet restore src/OWCE.App/OWCE.App.csproj

      - name: Build iOS (Simulator, no signing)
        run: |
          dotnet build src/OWCE.App/OWCE.App.csproj \
            -f net9.0-ios \
            -c Debug \
            /p:RuntimeIdentifier=iossimulator-x64 \
            /p:CodesignKey="" \
            /p:CodesignProvision=""

      - name: Upload iOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-simulator
          path: src/OWCE.App/bin/Debug/net9.0-ios/iossimulator-x64/**/*.app
          retention-days: 14

  # ── Job 4: Build Wear OS (Linux, Gradle) ────────────────────────────────────
  build-wear:
    name: Build Wear OS
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Wear OS APK
        working-directory: src/OWCE.Watch.Android
        run: |
          gradle assembleDebug --no-daemon

      - name: Upload Wear OS APK
        uses: actions/upload-artifact@v4
        with:
          name: wear-debug-apk
          path: src/OWCE.Watch.Android/build/outputs/apk/debug/*.apk
          retention-days: 14
